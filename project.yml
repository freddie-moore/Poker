name: PokerTracker
options:
  bundleIdPrefix: com.poker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  PokerTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PokerTracker
    settings:
      base:
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.poker.PokerTracker
        INFOPLIST_FILE: PokerTracker/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PokerTracker/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Fred's Poker
